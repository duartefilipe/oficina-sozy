spring:
  datasource:
    url: jdbc:h2:mem:mototest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

app:
  jwt:
    secret: test-jwt-secret-for-integration-tests-min-32-chars
    expiration-seconds: 3600
  bootstrap:
    superadmin:
      username: superadmin
      password: superadmin123
      nome: Super Admin
