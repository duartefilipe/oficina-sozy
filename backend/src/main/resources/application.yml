spring:
  application:
    name: moto-manager
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/moto_manager}
    username: ${SPRING_DATASOURCE_USERNAME:dbuser}
    password: ${SPRING_DATASOURCE_PASSWORD:dbpassword}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-change-this-secret-123456}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:28800}
  bootstrap:
    superadmin:
      username: ${APP_BOOTSTRAP_SUPERADMIN_USERNAME:superadmin}
      password: ${APP_BOOTSTRAP_SUPERADMIN_PASSWORD:superadmin123}
      nome: ${APP_BOOTSTRAP_SUPERADMIN_NOME:Super Admin}
