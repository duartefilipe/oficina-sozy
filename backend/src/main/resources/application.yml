spring:
  application:
    name: moto-manager
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:192.168.31.229}:${POSTGRES_PORT:15432}/${POSTGRES_DB:moto_manager}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-change-this-secret-123456}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:28800}
  bootstrap:
    superadmin:
      username: ${APP_BOOTSTRAP_SUPERADMIN_USERNAME:superadmin}
      password: ${APP_BOOTSTRAP_SUPERADMIN_PASSWORD:superadmin123}
      nome: ${APP_BOOTSTRAP_SUPERADMIN_NOME:Super Admin}
