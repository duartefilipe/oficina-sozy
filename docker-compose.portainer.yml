version: "3.8"

services:
  backend:
    build: ./backend
    container_name: oficina_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://192.168.31.229:15432/moto_manager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
    ports:
      - "18080:8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: oficina_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
